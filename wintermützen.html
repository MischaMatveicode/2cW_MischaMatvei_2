<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valyr - Mützen</title>
<style>
    body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: black;
    color: white;
    position: relative;
}
body::before {
    content: "";
    background: url('logo.jpg') no-repeat center center;
    background-size: cover;
    opacity: 0.05;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}
.main-header {
    background-color: white;
    padding: 20px 0;
    text-align: center;
}
.main-header h1 {
    color: black;
    font-family: 'Arial Black', sans-serif;
    font-size: 36px;
    margin: 0;
}
.main-nav {
    text-align: center;
    background-color: #222;
    padding: 10px 0;
}
.main-nav a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
    font-size: 18px;
}
.main-nav a:hover {
    color: #ffcc00;
}
.shop-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 50px 20px;
    max-width: 1200px;
    margin: 0 auto;
}
.product {
    background-color: #111;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
}
.product:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #ffcc00;
}
.product img {
    max-width: 100%;
    height: 250px;
    background-color: #222;
    border-radius: 5px;
    margin-bottom: 15px;
    object-fit: cover;
}
.product h3 {
    margin: 10px 0;
    font-size: 22px;
}
.product p {
    font-size: 18px;
    color: #ccc;
}
.product button {
    margin-top: 10px;
    padding: 10px 20px;
    font-size: 16px;
    background-color: #ffcc00;
    color: black;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.2s;
}
.product button:hover {
    background-color: #e6b800;
}
